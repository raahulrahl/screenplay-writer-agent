id: screenplay-writer-v1
name: screenplay-writer
version: 1.0.0
author: paras25619@gmail.com

# Description
description: |
  Transforms creative ideas, conversations, or rough drafts into professionally formatted screenplays.
  Extracts story elements, evaluates character development, writes scenes, formats scripts, and provides
  quality scoring with actionable recommendations. Produces complete screenplay output and structured
  character analysis.

# Tags and Modes
tags:
  - screenplay
  - scriptwriting
  - storytelling
  - character-development
  - scene-construction
  - dialogue
  - formatting
  - creative-writing
  - film-production

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Transform this conversation into a courtroom drama scene"
  - "Develop a protagonist for a cyberpunk story"
  - "Write a 3-act structure for a romantic comedy"
  - "Format this dialogue into proper screenplay format"
  - "Create a scene breakdown for a horror movie"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Transforms creative input into fully formatted screenplays with analysis and scoring"
    features:
      - "Extracts story elements from input text"
      - "Develops characters and arcs with detailed profiles"
      - "Writes and formats scenes in industry-standard screenplay styles"
      - "Evaluates story structure, dialogue quality, emotional impact, and formatting accuracy"
      - "Provides overall quality scoring and improvement suggestions"
    limitations: "Requires clear input material; may not fully interpret highly abstract ideas"

  secondary_capability:
    supported: true
    description: "Provides structured character analysis and scene breakdown"
    features:
      - "Generates detailed character profiles including backstory, motivation, traits, and arcs"
      - "Breaks down scenes with actions, dialogue, and transitions"
      - "Assigns quality ratings for each story and character element"
      - "Provides actionable recommendations for script improvement"

# Requirements
requirements:
  packages:
    - crewai>=0.80.0
    - crewai-tools>=0.1.0
    - langchain>=0.1.0
    - langchain-openai>=0.0.5
    - openai>=2.11.0
    - bindu==2026.1.12
    - python-dotenv>=1.0.1
    - pyyaml>=6.0
  system: []
  min_memory_mb: 512
  external_services:
    - OpenRouter API (or OpenAI API)
    - Mem0 API (optional, for memory features)

# Performance Metrics
performance:
  avg_processing_time_ms: 10000
  avg_time_per_agent_ms: 2000
  max_concurrent_requests: 3
  memory_per_request_mb: 512
  timeout_seconds: 180
  max_input_length_chars: 5000
  scalability: vertical

# Tool Restrictions
allowed_tools:
  - Read
  - Analyze
  - Write
  - Format
  - Evaluate
  - Generate

# Rich Documentation
documentation:
  overview: |
    Converts ideas, rough drafts, or conversations into fully formatted screenplays.
    Uses a sequential crew of AI agents for story analysis, character development, scene writing,
    formatting, and quality evaluation. Maintains character consistency, industry-standard formatting,
    and emotionally engaging narratives.

  use_cases:
    when_to_use:
      - Transform raw dialogue or conversations into screenplay scenes
      - Develop characters and their story arcs
      - Format scripts professionally (Hollywood, Fountain, or Final Draft)
      - Analyze story structure and scene quality
      - Generate actionable improvement suggestions
      - Explore genre-specific adaptations of story ideas

    when_not_to_use:
      - Simple text editing or grammar correction
      - Code generation or technical writing
      - Academic paper writing or research
      - Real-time collaboration or live editing
      - Legal or highly specialized script formatting

  input_structure: |
    Accepts screenplay writing requests in plain text or structured JSON:

    Example (JSON):
    {
      "query": "Write a romantic comedy meet-cute scene",
      "input_material": "Raw dialogue or story idea",
      "genre": "drama|comedy|thriller|sci-fi|romance|horror|action",
      "tone": "serious|comedic|dramatic|noir|satirical",
      "length": "short|medium|full",
      "format_style": "hollywood|fountain|final_draft"
    }

    Constraints:
    - Max input length: 5000 characters
    - Max agents in crew: 5
    - Timeout: 180 seconds
    - Language: English

  output_format: |
    Returns structured screenplay with story analysis and character profiles:

    Output Structure:
    - STORY SUMMARY: Brief summary (< 30 words)
    - SCENES: For each scene:
      - SCENE_HEADER
      - ACTION_LINES
      - CHARACTER_DIALOGUE
      - PARENTHETICALS
      - TRANSITIONS
    - CHARACTER_PROFILES: For each character:
      - NAME
      - ROLE
      - BACKSTORY
      - MOTIVATION
      - PERSONALITY_TRAITS
      - DIALOGUE_PATTERNS
      - CHARACTER_ARC
    - QUALITY_SCORE:
      - STORY_STRUCTURE
      - CHARACTER_DEVELOPMENT
      - DIALOGUE_QUALITY
      - FORMATTING
      - EMOTIONAL_IMPACT
      - OVERALL
    - RECOMMENDATIONS: Improvement suggestions

  error_handling:
    - "Input too long: Returns error requesting maximum length"
    - "API rate limits: Queues requests or suggests simpler queries"
    - "Crew initialization failed: Returns initialization error with troubleshooting steps"
    - "Formatting errors: Returns partial results with error explanation"
    - "Timeout: Returns intermediate results with completion percentage"
    - "Unclear input: Provides guidance on acceptable input formats"

  examples:
    - title: "Legal Debate to Courtroom Drama"
      input:
        query: "Transform this legal debate into a courtroom drama scene"
        input_material: "Two lawyers arguing about evidence admissibility in a high-profile case..."
        genre: "drama"
        tone: "serious"
      output:
        success: true
        screenplay:
          formatted_script: "INT. COURTROOM - DAY\n\nJUDGE MARKS bangs the gavel..."
          quality_score:
            overall: 8.5
        metadata:
          processing_time_ms: 11500
          agents_used: 5

    - title: "Cyberpunk Character Development"
      input:
        query: "Develop a protagonist for a cyberpunk detective story"
        genre: "sci-fi"
        tone: "noir"
      output:
        success: true
        characters:
          - name: "Detective Raine"
            role: "protagonist"
            backstory: "Former corporate security officer turned private eye..."
            motivation: "Seeking redemption for past failures..."
        metadata:
          processing_time_ms: 8500
          agents_used: 2

    - title: "Romantic Comedy Scene"
      input:
        query: "Write a meet-cute scene for a romantic comedy"
        genre: "comedy"
        tone: "lighthearted"
        length: "short"
      output:
        success: true
        screenplay:
          formatted_script: "EXT. COFFEE SHOP - DAY\n\nALEX spills coffee on SAM..."
          quality_score:
            overall: 8.2
        metadata:
          processing_time_ms: 9200
          agents_used: 5

  best_practices:
    for_developers:
      - "Provide full context and input material for best results"
      - "Specify genre and tone for targeted output"
      - "Use quality scoring feedback to iterate screenplay improvements"
      - "Implement caching for repeated queries to improve performance"
      - "Monitor crew task completion to debug workflow issues"

    for_orchestrators:
      - "Route screenplay writing requests to this agent"
      - "Chain with summary agents for executive overviews of scripts"
      - "Consider input complexity when setting timeout values"
      - "Use confidence scores from quality evaluation for routing decisions"
      - "Fallback to simpler writing tasks for basic formatting needs"

  installation: |
    Required packages:
    pip install crewai crewai-tools langchain langchain-openai bindu openai python-dotenv pyyaml

    Environment variables:
    OPENROUTER_API_KEY=your_openrouter_api_key
    OPENAI_API_KEY=your_openai_api_key  # Alternative
    MEM0_API_KEY=your_mem0_api_key  # Optional
    MODEL_NAME=openai/gpt-4o  # Optional

  versioning:
    - version: "1.0.0"
      date: "2026-01-14"
      changes: "Initial release with 5-agent crew for screenplay writing, character development, formatting, and scoring"
    - version: "1.1.0"
      status: "planned"
      changes: "Add support for additional screenplay formats and genre-specific templates"
    - version: "1.2.0"
      status: "planned"
      changes: "Enhanced character relationship mapping and conflict development"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - screenplay
    - script
    - writing
    - dialogue
    - character
    - story
    - formatting
    - scene
    - plot
    - development
    - hollywood
    - film
    - movie
    - scriptwriting

  specializations:
    - domain: creative_writing
      confidence_boost: 0.4
    - domain: film_production
      confidence_boost: 0.3
    - domain: character_development
      confidence_boost: 0.2
    - domain: dialogue_writing
      confidence_boost: 0.1

  anti_patterns:
    - "simple editing"
    - "grammar correction"
    - "code generation"
    - "technical writing"
    - "research paper"
    - "mathematical calculation"
    - "real-time events"
    - "live updates"

  complexity_indicators:
    simple:
      - "format dialogue"
      - "basic scene"
      - "simple conversion"
      - "short scene"
    medium:
      - "develop character"
      - "write scene"
      - "story structure"
      - "genre adaptation"
    complex:
      - "complete screenplay"
      - "character arcs"
      - "plot development"
      - "multi-scene script"
      - "professional formatting"
